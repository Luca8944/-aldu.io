<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para ti</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #2b0000 0%, #000000 100%);
            font-family: 'Montserrat', sans-serif;
            color: #ffcccc;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PANTALLA DE BLOQUEO --- */
        #lock-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.8s ease;
        }

        .instruction {
            margin-bottom: 40px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.3rem;
            color: #ff4d4d;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
            pointer-events: none;
        }

        #drop-zone {
            width: 130px;
            height: 130px;
            border: 2px dashed #800000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
            box-shadow: 0 0 30px rgba(100, 0, 0, 0.2);
            transition: all 0.3s ease;
            background: rgba(20, 0, 0, 0.6);
        }
        
        #drop-zone.active {
            border-color: #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.8);
            transform: scale(1.15);
            background: rgba(50, 0, 0, 0.8);
        }

        #drop-text {
            font-size: 0.75rem;
            color: #aa4444;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* EL BESO */
        #draggable-kiss {
            font-size: 4.5rem;
            cursor: grab;
            position: relative; 
            z-index: 30;
            animation: heartbeat 1.5s infinite;
            filter: drop-shadow(0 0 10px rgba(255,0,0,0.5));
            /* Importante para que iPhone detecte bien el toque */
            width: 80px; 
            height: 80px;
            text-align: center;
            line-height: 80px;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        /* --- PANTALLA CARTA --- */
        #letter-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            opacity: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
            transition: opacity 1.5s ease;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: linear-gradient(135deg, #1a0000 0%, #2e0505 100%);
            padding: 30px;
            width: 85%;
            max-width: 400px;
            border-radius: 4px;
            border: 1px solid #5c1818;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
            text-align: center;
            position: relative;
        }

        .card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #ff1a1a;
            margin-top: 0;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        .card p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 15px;
            color: #d1d1d1;
            font-weight: 300;
        }

        .highlight-text {
            color: #ff6666;
            font-weight: 600;
            font-style: italic;
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
        }

        /* Botón de rescate por si el audio falla */
        .music-btn {
            background: transparent;
            border: 1px solid #5c1818;
            color: #666;
            padding: 5px 10px;
            font-size: 0.7rem;
            margin-top: 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* --- EFECTOS --- */
        .kiss-rain {
            position: absolute;
            top: -50px;
            font-size: 2rem;
            z-index: 5;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Player invisible pero NO 'display:none' (Crucial para iPhone) */
        #player {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div id="drop-zone">
            <span id="drop-text">Arrastra aquí</span>
        </div>
        <div class="instruction">Tócame y llévame al círculo...</div>
        <div id="draggable-kiss">💋</div>
    </div>

    <div id="letter-screen">
        <div class="card">
            <h1>Extraño</h1>
            <p>Como extraño sentir de noche conmigo tu piel</p>
            <p>y que me acaricies</p>
            <p class="highlight-text">y que yo te muerda</p>
            <br>
            <p>y desvelarnos sin saber qué más hacer</p>
            <p>y solucionarlo</p>
            <p class="highlight-text">con algunos besos..</p>
            
            <!-- Botón de emergencia discreto -->
            <button class="music-btn" onclick="forcePlay()">🎵 Play</button>
        </div>
    </div>

    <div id="player"></div>

    <script>
        var player;
        var audioStarted = false;

        // 1. YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'yI3cdm3CVWs',
                playerVars: {
                    'playsinline': 1, // CRUCIAL
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0,
                    'origin': window.location.origin
                }
            });
        }

        // Función para intentar reproducir
        function tryPlayAudio() {
            if (!audioStarted && player && typeof player.playVideo === 'function') {
                player.playVideo();
                audioStarted = true;
            }
        }

        // Función de respaldo manual
        function forcePlay() {
            if (player) {
                player.playVideo();
                player.setVolume(100);
            }
        }

        // 2. Lógica Drag & Drop
        const kiss = document.getElementById('draggable-kiss');
        const dropZone = document.getElementById('drop-zone');
        const lockScreen = document.getElementById('lock-screen');
        const letterScreen = document.getElementById('letter-screen');

        let isDragging = false;
        let startX, startY;
        
        // --- INICIO DEL TOQUE (Aquí activamos el audio para iPhone) ---
        kiss.addEventListener('touchstart', function(e) {
            // INTENTO DE REPRODUCCIÓN INMEDIATA AL TOCAR
            tryPlayAudio();

            e.preventDefault(); 
            isDragging = true;
            let touch = e.touches[0];
            
            const rect = kiss.getBoundingClientRect();
            startX = touch.clientX - rect.left;
            startY = touch.clientY - rect.top;
            
            kiss.style.position = 'fixed';
            kiss.style.left = rect.left + 'px';
            kiss.style.top = rect.top + 'px';
            kiss.style.zIndex = 100;
            kiss.style.animation = 'none';
            kiss.style.transform = 'scale(1.2)';
        }, {passive: false});

        // --- MOVIMIENTO ---
        kiss.addEventListener('touchmove', function(e) {
            if (!isDragging) return;
            e.preventDefault();
            let touch = e.touches[0];
            
            kiss.style.left = (touch.clientX - startX) + 'px';
            kiss.style.top = (touch.clientY - startY) + 'px';

            checkCollision(touch.clientX, touch.clientY);
        }, {passive: false});

        // --- FINAL DEL TOQUE (Soltar) ---
        kiss.addEventListener('touchend', function(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // Re-confirmar audio por si acaso
            tryPlayAudio();

            const touch = e.changedTouches[0];
            const zoneRect = dropZone.getBoundingClientRect();
            
            if (touch.clientX >= zoneRect.left && touch.clientX <= zoneRect.right &&
                touch.clientY >= zoneRect.top && touch.clientY <= zoneRect.bottom) {
                unlockSuccess();
            } else {
                resetPosition();
            }
        });

        // Soporte Mouse (PC)
        kiss.addEventListener('mousedown', function(e) {
            tryPlayAudio(); // Audio en PC
            e.preventDefault();
            let rect = kiss.getBoundingClientRect();
            let shiftX = e.clientX - rect.left;
            let shiftY = e.clientY - rect.top;
            
            kiss.style.position = 'fixed';
            kiss.style.zIndex = 100;

            function moveAt(pageX, pageY) {
                kiss.style.left = pageX - shiftX + 'px';
                kiss.style.top = pageY - shiftY + 'px';
                checkCollision(pageX, pageY);
            }

            function onMouseMove(event) { moveAt(event.clientX, event.clientY); }
            document.addEventListener('mousemove', onMouseMove);

            kiss.onmouseup = function(event) {
                document.removeEventListener('mousemove', onMouseMove);
                kiss.onmouseup = null;
                const zoneRect = dropZone.getBoundingClientRect();
                const kRect = kiss.getBoundingClientRect();
                const cX = kRect.left + kRect.width/2;
                const cY = kRect.top + kRect.height/2;

                if (cX >= zoneRect.left && cX <= zoneRect.right &&
                    cY >= zoneRect.top && cY <= zoneRect.bottom) {
                    unlockSuccess();
                } else {
                    resetPosition();
                }
            };
        });

        function checkCollision(x, y) {
            const rect = dropZone.getBoundingClientRect();
            if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                dropZone.classList.add('active');
            } else {
                dropZone.classList.remove('active');
            }
        }

        function resetPosition() {
            kiss.style.position = 'relative';
            kiss.style.left = 'auto';
            kiss.style.top = 'auto';
            kiss.style.animation = 'heartbeat 1.5s infinite';
            kiss.style.transform = 'scale(1)';
            dropZone.classList.remove('active');
        }

        function unlockSuccess() {
            kiss.style.display = 'none';
            dropZone.style.transform = 'scale(0)';
            createKissRain();
            lockScreen.style.opacity = '0';
            setTimeout(() => {
                lockScreen.style.display = 'none';
                letterScreen.style.display = 'flex';
                setTimeout(() => { letterScreen.style.opacity = '1'; }, 100);
            }, 500);
        }

        function createKissRain() {
            const emojis = ['💋', '🔥', '🫦', '❤️'];
            for (let i = 0; i < 40; i++) {
                const k = document.createElement('div');
                k.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                k.classList.add('kiss-rain');
                k.style.left = Math.random() * 100 + 'vw';
                k.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                k.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
                k.style.opacity = Math.random();
                document.body.appendChild(k);
            }
        }
    </script>
</body>
</html>
