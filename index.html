<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para ti</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #3a0000 0%, #0f0000 100%);
            font-family: 'Montserrat', sans-serif;
            color: #ffcccc;
            user-select: none; /* Evita seleccionar texto al arrastrar */
        }

        /* --- PANTALLA DE BLOQUEO (ARRASTRAR) --- */
        #lock-screen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 1s ease;
        }

        .instruction {
            margin-bottom: 50px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* Zona de destino */
        #drop-zone {
            width: 120px;
            height: 120px;
            border: 2px dashed #ff4d4d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            transition: 0.3s;
            background: rgba(50, 0, 0, 0.5);
        }
        
        #drop-zone.highlight {
            background: rgba(100, 0, 0, 0.8);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
            transform: scale(1.1);
            border-style: solid;
        }

        #drop-text {
            font-size: 0.8rem;
            color: #ff9999;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* El beso arrastrable */
        #draggable-kiss {
            font-size: 4rem;
            cursor: grab;
            position: relative; /* Necesario para moverlo */
            transition: transform 0.1s;
            animation: pulse 2s infinite;
            z-index: 30;
            touch-action: none; /* Crucial para móviles */
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 10px red); }
            100% { transform: scale(1); }
        }

        /* --- PANTALLA DE LA CARTA --- */
        #letter-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            opacity: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10;
            transition: opacity 2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: linear-gradient(135deg, #1a0505 0%, #2d0a0a 100%);
            padding: 40px 30px;
            width: 80%;
            max-width: 400px;
            border-radius: 2px;
            border: 1px solid #4a1c1c;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.15);
            text-align: center;
            position: relative;
        }

        .card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #ff3333;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }

        .card p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #e0e0e0;
            font-weight: 300;
        }

        .highlight-text {
            color: #ff6666;
            font-weight: 400;
        }

        /* --- LLUVIA DE BESOS --- */
        .kiss-rain {
            position: absolute;
            top: -50px;
            font-size: 2rem;
            z-index: 5;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        #player { position: absolute; visibility: hidden; }
    </style>
</head>
<body>

    <!-- PANTALLA 1: ARRASTRAR -->
    <div id="lock-screen">
        <div id="drop-zone">
            <span id="drop-text">Arrastra aquí</span>
        </div>
        <div class="instruction">Dame un beso para leer...</div>
        
        <!-- El elemento que se mueve -->
        <div id="draggable-kiss">💋</div>
    </div>

    <!-- PANTALLA 2: CARTA -->
    <div id="letter-screen">
        <div class="card">
            <h1>Extraño</h1>
            <p>Como extraño sentir de noche conmigo tu piel</p>
            <p>y que me acaricies</p>
            <p class="highlight-text">y que yo te muerda</p>
            <br>
            <p>y desvelarnos sin saber qué más hacer</p>
            <p>y solucionarlo</p>
            <p class="highlight-text">con algunos besos..</p>
        </div>
    </div>

    <div id="player"></div>

    <script>
        // --- LÓGICA DE YOUTUBE ---
        var player;
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'yI3cdm3CVWs', // A Fuego - Bizarrap Remix
                playerVars: { 'playsinline': 1, 'controls': 0, 'rel': 0, 'showinfo': 0, 'start': 0 }
            });
        }

        // --- LÓGICA DE ARRASTRAR (DRAG & DROP TÁCTIL) ---
        const kiss = document.getElementById('draggable-kiss');
        const dropZone = document.getElementById('drop-zone');
        const lockScreen = document.getElementById('lock-screen');
        const letterScreen = document.getElementById('letter-screen');

        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        // Eventos para Celular (Touch)
        kiss.addEventListener('touchstart', startDrag, {passive: false});
        kiss.addEventListener('touchmove', moveDrag, {passive: false});
        kiss.addEventListener('touchend', endDrag);

        // Eventos para PC (Mouse)
        kiss.addEventListener('mousedown', startDragMouse);

        function startDrag(e) {
            e.preventDefault(); // Evitar scroll
            isDragging = true;
            let touch = e.touches[0];
            
            // Guardar posición inicial relativa
            const rect = kiss.getBoundingClientRect();
            startX = touch.clientX - rect.left;
            startY = touch.clientY - rect.top;
            
            kiss.style.position = 'fixed'; // Cambiar a fixed para mover libremente
            kiss.style.left = rect.left + 'px';
            kiss.style.top = rect.top + 'px';
            kiss.style.zIndex = 100;
        }

        function moveDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            let touch = e.touches[0];
            
            kiss.style.left = (touch.clientX - startX) + 'px';
            kiss.style.top = (touch.clientY - startY) + 'px';

            checkCollision(touch.clientX, touch.clientY);
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // Verificar si soltó dentro
            const kissRect = kiss.getBoundingClientRect();
            const zoneRect = dropZone.getBoundingClientRect();
            
            // Centro del beso
            const centerX = kissRect.left + kissRect.width / 2;
            const centerY = kissRect.top + kissRect.height / 2;

            if (centerX > zoneRect.left && centerX < zoneRect.right &&
                centerY > zoneRect.top && centerY < zoneRect.bottom) {
                unlockSuccess();
            } else {
                // Volver a posición original si falló
                kiss.style.position = 'relative';
                kiss.style.left = 'auto';
                kiss.style.top = 'auto';
                dropZone.classList.remove('highlight');
            }
        }

        // Lógica simple para Mouse (PC)
        function startDragMouse(e) {
            e.preventDefault();
            let rect = kiss.getBoundingClientRect();
            let shiftX = e.clientX - rect.left;
            let shiftY = e.clientY - rect.top;

            kiss.style.position = 'absolute';
            kiss.style.zIndex = 1000;

            function moveAt(pageX, pageY) {
                kiss.style.left = pageX - shiftX + 'px';
                kiss.style.top = pageY - shiftY + 'px';
            }

            function onMouseMove(event) {
                moveAt(event.pageX, event.pageY);
                // Chequear colisión visual
                const zoneRect = dropZone.getBoundingClientRect();
                if(event.pageX > zoneRect.left && event.pageX < zoneRect.right && 
                   event.pageY > zoneRect.top && event.pageY < zoneRect.bottom) {
                    dropZone.classList.add('highlight');
                } else {
                    dropZone.classList.remove('highlight');
                }
            }

            document.addEventListener('mousemove', onMouseMove);

            kiss.onmouseup = function(event) {
                document.removeEventListener('mousemove', onMouseMove);
                kiss.onmouseup = null;
                
                // Verificar éxito
                const zoneRect = dropZone.getBoundingClientRect();
                if(event.pageX > zoneRect.left && event.pageX < zoneRect.right && 
                   event.pageY > zoneRect.top && event.pageY < zoneRect.bottom) {
                    unlockSuccess();
                } else {
                    kiss.style.position = 'relative';
                    kiss.style.left = 'auto';
                    kiss.style.top = 'auto';
                    dropZone.classList.remove('highlight');
                }
            };
        }

        function checkCollision(x, y) {
            const rect = dropZone.getBoundingClientRect();
            if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                dropZone.classList.add('highlight');
            } else {
                dropZone.classList.remove('highlight');
            }
        }

        // --- FUNCIÓN DE ÉXITO ---
        function unlockSuccess() {
            // 1. Reproducir Música
            if(player && player.playVideo) {
                player.setVolume(100);
                player.playVideo();
            }

            // 2. Lluvia de Besos
            createKissRain();

            // 3. Transición de Pantalla
            lockScreen.style.opacity = '0';
            setTimeout(() => {
                lockScreen.style.display = 'none';
                letterScreen.style.display = 'flex';
                setTimeout(() => {
                    letterScreen.style.opacity = '1';
                }, 100);
            }, 800);
        }

        function createKissRain() {
            const emojis = ['💋', '👄', '🔥', '❤️'];
            for (let i = 0; i < 50; i++) {
                const k = document.createElement('div');
                k.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                k.classList.add('kiss-rain');
                k.style.left = Math.random() * 100 + 'vw';
                k.style.animationDuration = (Math.random() * 2 + 2) + 's';
                k.style.fontSize = (Math.random() * 2 + 1) + 'rem';
                document.body.appendChild(k);
            }
        }
    </script>
</body>
</html>
